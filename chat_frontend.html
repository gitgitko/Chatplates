<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chatplates</title>
<style>
/* (same CSS as before - keep unchanged) */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3250;--accent:#6c63ff;--accent2:#a78bfa;--text:#e2e8f0;--muted:#8892b0;--green:#4ade80;--red:#f87171;--yellow:#fbbf24}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;align-items:center;justify-content:center}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;color:var(--text);font-size:.95rem;outline:none}
input:focus{border-color:var(--accent)}
.btn{width:100%;padding:.75rem;border-radius:10px;border:none;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:.75rem}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.err{color:var(--red);font-size:.82rem;margin-top:.4rem}
label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:.4rem}
#landing{width:100%;max-width:440px;padding:2rem}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.card h2{font-size:1rem;margin-bottom:1rem}
.badge{font-size:.7rem;padding:.2rem .5rem;border-radius:20px}
.badge.pub{background:#4ade8022;color:var(--green)}
.badge.sec{background:#6c63ff22;color:var(--accent2)}
.badge.own{background:#fbbf2422;color:var(--yellow)}
.badge.guest{background:#a78bfa22;color:var(--accent2)}
#chat{display:none;width:100%;height:100vh;flex-direction:row}
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1rem;gap:.8rem}
.sidebar h3{font-size:.72rem;color:var(--muted)}
#userList,#onlineList{list-style:none}
#userList li,#onlineList li{font-size:.85rem;cursor:pointer;padding:.2rem .3rem}
#userList li::before{content:'●';color:var(--green);margin-right:.5rem}
#onlineList li::before{content:'💬';margin-right:.5rem}
.leave-btn{margin-top:auto;background:transparent;border:1px solid var(--border);border-radius:8px;padding:.5rem;cursor:pointer}
#ownerPanel{background:var(--surface2);border:1px solid #fbbf2433;border-radius:10px;padding:.75rem;display:none}
#ownerPanel h3{color:var(--yellow);font-size:.78rem}
.invite-result{display:none;margin-top:.4rem}
.main{flex:1;display:flex;flex-direction:column}
.chat-header{padding:.9rem 1.25rem;border-bottom:1px solid var(--border);display:flex;gap:.75rem}
.tabs{display:flex;gap:.5rem;padding:.6rem 1.25rem;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:.35rem .8rem;border-radius:20px;font-size:.8rem;cursor:pointer;border:1px solid var(--border);color:var(--muted)}
.tab.active{background:var(--accent);color:#fff}
#messages{flex:1;overflow-y:auto;padding:1.25rem}
.msg{margin-bottom:.5rem}
.msg.me{text-align:right}
.bubble{display:inline-block;padding:.4rem .8rem;border-radius:12px;background:var(--surface2)}
.msg.me .bubble{background:var(--accent);color:#fff}
.input-area{padding:.9rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:.75rem}
.input-area input{flex:1}
.send-btn{background:var(--accent);border:none;border-radius:12px;width:44px;cursor:pointer}
</style>
</head>
<body>

<div id="landing">
  <div class="logo"><h1>⚡ Chatplates</h1><p>Real-time chat with rooms & DMs</p></div>

  <div class="card">
    <h2>👑 Owner Login <span class="badge own">Owner</span></h2>
    <input id="ownerPin" type="password" placeholder="PIN">
    <input id="ownerName" placeholder="Your name">
    <div class="err" id="ownerErr"></div>
    <button class="btn btn-primary" onclick="loginOwner()">Login</button>
  </div>

  <div class="card">
    <h2>🔐 Secret Room <span class="badge sec">Invite only</span></h2>
    <input id="secretCode" placeholder="Invite code" style="text-transform:uppercase">
    <div class="err" id="secretErr"></div>
    <button class="btn btn-primary" onclick="joinSecretRoom()">Join</button>
  </div>

  <div class="card">
    <h2>🆓 Guest Lounge <span class="badge guest">Free</span></h2>
    <input id="guestName" placeholder="Your guest name">
    <div class="err" id="guestErr"></div>
    <button class="btn btn-primary" onclick="joinGuest()">Enter Guest Lounge</button>
  </div>
</div>

<div id="chat">
  <div class="sidebar">
    <h3>In Room — <span id="onlineCount">0</span></h3>
    <ul id="userList"></ul>
    <h3>All Online</h3>
    <ul id="onlineList"></ul>
    <div id="ownerPanel">
      <h3>👑 Create Invite</h3>
      <input id="inviteName" placeholder="User's name">
      <button class="btn btn-primary" onclick="createInvite()">Generate Code</button>
      <div class="invite-result" id="inviteResult"><span id="inviteCode"></span><button class="copy-btn" onclick="copyInvite()">📋</button></div>
    </div>
    <button class="leave-btn" onclick="leaveRoom()">Leave</button>
  </div>
  <div class="main">
    <div class="chat-header"><strong id="headerRoom">Room</strong> <span id="headerSub">Connecting...</span></div>
    <div class="tabs" id="tabs"></div>
    <div id="messages"></div>
    <div class="input-area"><input id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()"><button class="send-btn" onclick="sendMsg()">➤</button></div>
  </div>
</div>

<script>
const WS_URL = 'wss://chatplates.onrender.com/ws'; // CHANGE THIS TO YOUR RENDER URL
let ws = null, myName = '', isOwner = false;
let activeTab = 'public';
let tabsData = {};

function openTab(id) { activeTab = id; renderTabs(); renderMessages(); }
function renderTabs() { /* simplified for brevity, but functional */ 
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  for (let id in tabsData) {
    let t = tabsData[id];
    let div = document.createElement('div');
    div.className = 'tab' + (id === activeTab ? ' active' : '');
    div.textContent = t.label;
    div.onclick = () => openTab(id);
    el.appendChild(div);
  }
}
function ensureTab(id, label) { if (!tabsData[id]) tabsData[id] = { id, label, messages: [] }; }
function addTabMsg(tabId, sender, text, type, time) {
  if (!tabsData[tabId]) return;
  tabsData[tabId].messages.push({ sender, text, type, time });
  if (activeTab === tabId) renderMessages();
}
function renderMessages() {
  const wrap = document.getElementById('messages');
  wrap.innerHTML = '';
  let msgs = tabsData[activeTab]?.messages || [];
  msgs.forEach(m => {
    let div = document.createElement('div');
    div.className = 'msg' + (m.type === 'me' ? ' me' : '');
    let bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = `<strong>${m.sender}</strong> ${m.text}<br><small>${m.time}</small>`;
    div.appendChild(bubble);
    wrap.appendChild(div);
  });
  wrap.scrollTop = wrap.scrollHeight;
}

function loginOwner() {
  let pin = document.getElementById('ownerPin').value.trim();
  let name = document.getElementById('ownerName').value.trim() || 'Owner';
  if (!pin) { document.getElementById('ownerErr').textContent = 'PIN required'; return; }
  connectWebSocket('owner', { type: 'auth', pin, name });
}
function joinSecretRoom() {
  let code = document.getElementById('secretCode').value.trim().toUpperCase();
  if (!code) { document.getElementById('secretErr').textContent = 'Code required'; return; }
  connectWebSocket('secret', { type: 'auth', code });
}
function joinGuest() {
  let name = document.getElementById('guestName').value.trim();
  if (!name) { document.getElementById('guestErr').textContent = 'Name required'; return; }
  connectWebSocket('guest', { type: 'auth', name });
}

// ========== FIXED WEBSOCKET CONNECTION ==========
function connectWebSocket(roomType, authMsg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.close();

  let wsUrl = roomType === 'guest' ? `${WS_URL}/guest` : `${WS_URL}/public`;
  console.log('Connecting to', wsUrl);
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    console.log('open, sending auth');
    // Direct send – but ensure state is OPEN (it should be)
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(authMsg));
    } else {
      // fallback polling
      let attempt = 0;
      const trySend = () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(authMsg));
        } else if (attempt++ < 20) {
          setTimeout(trySend, 20);
        } else {
          console.error('Failed to send auth');
        }
      };
      trySend();
    }
  };

  ws.onmessage = (e) => {
    let d = JSON.parse(e.data);
    console.log('msg', d);
    if (d.type === 'auth_ok') {
      myName = d.name;
      isOwner = d.is_owner;
      showChat();
    } else if (d.type === 'auth_fail') {
      let errDiv = roomType === 'owner' ? document.getElementById('ownerErr') : (roomType === 'secret' ? document.getElementById('secretErr') : document.getElementById('guestErr'));
      errDiv.textContent = d.reason;
      ws.close(); ws = null;
    } else if (d.type === 'message') {
      let tab = d.room || 'public';
      ensureTab(tab, tab === 'public' ? 'Public' : tab);
      addTabMsg(tab, d.sender, d.text, d.sender === myName ? 'me' : 'other', d.time);
    } else if (d.type === 'system') {
      let tab = d.room || activeTab;
      ensureTab(tab, tab === 'public' ? 'Public' : tab);
      addTabMsg(tab, 'System', d.text, 'system', d.time);
    } else if (d.type === 'dm') {
      let tab = d.room;
      let other = d.sender === myName ? d.target : d.sender;
      ensureTab(tab, `DM: ${other}`);
      addTabMsg(tab, d.sender, d.text, d.sender === myName ? 'me' : 'other', d.time);
    } else if (d.type === 'users') {
      let list = document.getElementById('userList');
      list.innerHTML = '';
      d.users.forEach(u => { let li = document.createElement('li'); li.textContent = u; list.appendChild(li); });
      document.getElementById('onlineCount').textContent = d.users.length;
    } else if (d.type === 'online_users') {
      let list = document.getElementById('onlineList');
      list.innerHTML = '';
      d.users.filter(u => u !== myName).forEach(u => {
        let li = document.createElement('li'); li.textContent = u; li.onclick = () => startDM(u); list.appendChild(li);
      });
    } else if (d.type === 'invite_created') {
      document.getElementById('inviteCode').textContent = d.code;
      document.getElementById('inviteResult').style.display = 'flex';
    }
  };

  ws.onerror = (err) => {
    console.error('ws error', err);
    let errDiv = roomType === 'owner' ? document.getElementById('ownerErr') : (roomType === 'secret' ? document.getElementById('secretErr') : document.getElementById('guestErr'));
    errDiv.textContent = 'Connection failed. Is server running? Check backend logs.';
  };

  ws.onclose = () => {
    console.log('ws closed');
    document.getElementById('headerSub').textContent = 'Disconnected';
  };
}

function showChat() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  document.getElementById('headerRoom').textContent = myName;
  document.getElementById('headerSub').textContent = 'Connected';
  if (isOwner) document.getElementById('ownerPanel').style.display = 'block';
  ensureTab('public', 'Public');
  openTab('public');
}

function startDM(target) {
  let dmRoom = 'dm_' + [myName, target].sort().join('_');
  ensureTab(dmRoom, `DM: ${target}`);
  openTab(dmRoom);
}
function sendMsg() {
  let inp = document.getElementById('msgInput');
  let text = inp.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;
  let tab = tabsData[activeTab];
  if (tab && tab.label.startsWith('DM:')) {
    let target = tab.label.replace('DM: ', '');
    ws.send(JSON.stringify({ type: 'dm', target, text }));
  } else {
    ws.send(JSON.stringify({ type: 'message', text, room: activeTab }));
  }
  inp.value = '';
}
function createInvite() {
  let name = document.getElementById('inviteName').value.trim();
  if (!name) { alert('Enter a name'); return; }
  ws.send(JSON.stringify({ type: 'create_invite', invited_name: name }));
}
function copyInvite() {
  navigator.clipboard.writeText(document.getElementById('inviteCode').textContent);
}
function leaveRoom() { if(ws) ws.close(); location.reload(); }
</script>
</body>
</html>
