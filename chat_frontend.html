<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatplates – Voice + Text</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: #1a1d27; border: 1px solid #2e3250; border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; width: 100%; max-width: 400px; }
        input, button { width: 100%; padding: 0.7rem; margin-top: 0.5rem; border-radius: 12px; border: none; font-size: 1rem; }
        input { background: #22263a; color: white; border: 1px solid #2e3250; }
        button { background: linear-gradient(135deg, #6c63ff, #a78bfa); color: white; font-weight: bold; cursor: pointer; }
        .err { color: #f87171; font-size: 0.8rem; margin-top: 0.3rem; }
        .badge { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 20px; margin-left: 0.5rem; }
        .badge.public { background: #4ade8022; color: #4ade80; }
        .badge.secret { background: #a78bfa22; color: #a78bfa; }
        #landing { width: 100%; max-width: 440px; padding: 2rem; }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { font-size: 2rem; background: linear-gradient(135deg, #6c63ff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #chat { display: none; width: 100%; height: 100vh; flex-direction: row; }
        .sidebar { width: 260px; background: #1a1d27; border-right: 1px solid #2e3250; display: flex; flex-direction: column; padding: 1rem; gap: 1rem; }
        .sidebar h3 { font-size: 0.75rem; color: #8892b0; margin-top: 0.5rem; }
        #userList, #onlineList { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; }
        #userList li, #onlineList li { font-size: 0.85rem; padding: 0.2rem 0.3rem; border-radius: 6px; }
        #userList li::before { content: "●"; color: #4ade80; margin-right: 0.5rem; }
        #onlineList li::before { content: "👤"; margin-right: 0.5rem; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 0.8rem 1.2rem; border-bottom: 1px solid #2e3250; background: #1a1d27; }
        #messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .msg { display: flex; flex-direction: column; max-width: 70%; }
        .msg.me { align-self: flex-end; align-items: flex-end; }
        .msg.other { align-self: flex-start; }
        .msg.system { align-self: center; max-width: 90%; }
        .bubble { padding: 0.5rem 0.8rem; border-radius: 16px; background: #22263a; }
        .msg.me .bubble { background: #6c63ff; }
        .msg.system .bubble { background: #2e3250; color: #8892b0; font-size: 0.8rem; }
        .meta { font-size: 0.7rem; color: #8892b0; margin-bottom: 0.2rem; }
        .input-area { padding: 0.8rem; border-top: 1px solid #2e3250; display: flex; gap: 0.5rem; background: #1a1d27; }
        .input-area input { flex: 1; margin: 0; }
        .input-area button { width: auto; padding: 0.7rem 1.2rem; margin: 0; }
        .voice-btn { background: #22263a; border: 1px solid #4ade80; color: #4ade80; cursor: pointer; padding: 0.6rem; margin-top: 0.5rem; border-radius: 8px; font-size: 0.85rem; font-weight: bold; }
        .voice-btn.active { background: #4ade80; color: #0f1117; }
        .leave-btn { background: transparent; border: 1px solid #f87171; color: #f87171; margin-top: auto; }
        .leave-btn:hover { background: #f8717122; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
</head>
<body>

<div id="landing">
    <div class="logo"><h1>⚡ Chatplates</h1><p>Text + Voice • Public & Secret Rooms</p></div>

    <div class="card">
        <h2>🌐 Public Room <span class="badge public">Free</span></h2>
        <input type="text" id="publicName" placeholder="Your name">
        <div class="err" id="publicErr"></div>
        <button onclick="joinPublic()">Enter Public Room</button>
    </div>

    <div class="card">
        <h2>🔒 Secret Room <span class="badge secret">Passkey required</span></h2>
        <input type="text" id="secretName" placeholder="Your name">
        <input type="text" id="roomName" placeholder="Room name (e.g., gamers)">
        <input type="password" id="roomPasskey" placeholder="Passkey">
        <div class="err" id="secretErr"></div>
        <button onclick="joinSecretRoom()">Join / Create Secret Room</button>
        <small style="color:#8892b0;">If room doesn't exist, it will be created with this passkey.</small>
    </div>
</div>

<div id="chat">
    <div class="sidebar">
        <h3>In this room — <span id="onlineCount">0</span></h3>
        <ul id="userList"></ul>
        <h3>All online</h3>
        <ul id="onlineList"></ul>
        <button id="voiceBtn" class="voice-btn">🎤 Start Voice</button>
        <button class="leave-btn" onclick="leaveRoom()">← Leave room</button>
    </div>
    <div class="main">
        <div class="chat-header"><strong id="roomTitle">Room</strong> · <span id="headerSub">Connected</span></div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">Send</button>
        </div>
    </div>
</div>

<script>
    // 🔥 IMPORTANT: Change this to your actual Render URL (no trailing slash)
    const WS_URL = 'https://chatplates.onrender.com';

    let ws = null, myName = '', currentRoom = '', currentRoomRaw = '';

    // ---------- PeerJS Voice ----------
    let peer = null;
    let localStream = null;
    let connections = {};
    let voiceActive = false;
    let myPeerId = null;

    async function initVoice() {
        try {
            const peerId = `${currentRoomRaw}_${myName}_${Date.now()}`;
            peer = new Peer(peerId, {
                host: '0.peerjs.com',
                port: 443,
                secure: true
            });
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peer.on('open', (id) => {
                myPeerId = id;
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'peer_id', peerId: id }));
                }
            });
            peer.on('call', (call) => {
                call.answer(localStream);
                call.on('stream', (stream) => {
                    const audio = new Audio();
                    audio.srcObject = stream;
                    audio.autoplay = true;
                });
                connections[call.peer] = call;
            });
            return true;
        } catch (err) {
            console.error('Voice init failed:', err);
            alert('Could not start voice: ' + (err.message || 'microphone denied'));
            return false;
        }
    }

    function callPeer(remotePeerId) {
        if (!voiceActive || !peer || !localStream || connections[remotePeerId]) return;
        const call = peer.call(remotePeerId, localStream);
        call.on('stream', (stream) => {
            const audio = new Audio();
            audio.srcObject = stream;
            audio.autoplay = true;
        });
        connections[remotePeerId] = call;
    }

    async function startVoice() {
        if (voiceActive) return;
        const ok = await initVoice();
        if (!ok) return;
        voiceActive = true;
        document.getElementById('voiceBtn').textContent = '🔴 Mute Voice';
        document.getElementById('voiceBtn').classList.add('active');
    }

    function stopVoice() {
        if (!voiceActive) return;
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peer) peer.destroy();
        connections = {};
        voiceActive = false;
        document.getElementById('voiceBtn').textContent = '🎤 Start Voice';
        document.getElementById('voiceBtn').classList.remove('active');
    }

    document.getElementById('voiceBtn').addEventListener('click', () => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return alert('Not connected');
        voiceActive ? stopVoice() : startVoice();
    });

    // ---------- WebSocket Text Chat ----------
    function addMessage(sender, text, type, time) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if (type !== 'system') {
            const meta = document.createElement('div');
            meta.className = 'meta';
            meta.innerHTML = (type === 'me' ? 'You' : sender) + ' · ' + time;
            div.appendChild(meta);
        }
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        div.appendChild(bubble);
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function updateRoomUsers(users) {
        const list = document.getElementById('userList');
        list.innerHTML = '';
        users.forEach(u => {
            const li = document.createElement('li');
            li.textContent = u;
            if (u === myName) li.style.color = '#a78bfa';
            list.appendChild(li);
        });
        document.getElementById('onlineCount').textContent = users.length;
    }

    function updateOnlineUsers(users) {
        const list = document.getElementById('onlineList');
        list.innerHTML = '';
        users.filter(u => u !== myName).forEach(u => {
            const li = document.createElement('li');
            li.textContent = u;
            list.appendChild(li);
        });
    }

    function connectAndAuth(url, name, passkey, roomType, rawRoomName) {
        if (ws && ws.readyState === WebSocket.OPEN) ws.close();
        // Convert https -> wss for WebSocket
        const wsUrl = url.replace('https', 'wss');
        ws = new WebSocket(wsUrl);
        ws.onopen = () => {
            const msg = { type: 'auth', name };
            if (passkey) msg.passkey = passkey;
            ws.send(JSON.stringify(msg));
        };
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if (d.type === 'auth_ok') {
                myName = d.name;
                currentRoom = roomType === 'public' ? 'public' : rawRoomName.toUpperCase();
                currentRoomRaw = rawRoomName;
                showChat(roomType);
            } else if (d.type === 'auth_fail') {
                const errDiv = roomType === 'public' ? document.getElementById('publicErr') : document.getElementById('secretErr');
                errDiv.textContent = d.reason;
                ws.close();
            } else if (d.type === 'message') {
                addMessage(d.sender, d.text, d.sender === myName ? 'me' : 'other', d.time);
            } else if (d.type === 'system') {
                addMessage('', d.text, 'system', d.time);
            } else if (d.type === 'users') {
                updateRoomUsers(d.users);
            } else if (d.type === 'online_users') {
                updateOnlineUsers(d.users);
            } else if (d.type === 'peer_id' && voiceActive && d.peerId && d.peerId !== myPeerId) {
                callPeer(d.peerId);
            }
        };
        ws.onclose = () => {
            stopVoice();
            document.getElementById('headerSub').innerText = 'Disconnected';
        };
        ws.onerror = (err) => {
            console.error('WebSocket error', err);
            const errDiv = roomType === 'public' ? document.getElementById('publicErr') : document.getElementById('secretErr');
            errDiv.textContent = 'WebSocket connection failed.';
        };
    }

    function joinPublic() {
        const name = document.getElementById('publicName').value.trim();
        if (!name) return document.getElementById('publicErr').innerText = 'Name required';
        document.getElementById('publicErr').innerText = '';
        connectAndAuth(WS_URL, name, null, 'public', 'public');
    }

    function joinSecretRoom() {
        const name = document.getElementById('secretName').value.trim();
        const room = document.getElementById('roomName').value.trim();
        const passkey = document.getElementById('roomPasskey').value.trim();
        if (!name) return document.getElementById('secretErr').innerText = 'Name required';
        if (!room) return document.getElementById('secretErr').innerText = 'Room name required';
        if (!passkey) return document.getElementById('secretErr').innerText = 'Passkey required';
        document.getElementById('secretErr').innerText = '';
        connectAndAuth(WS_URL, name, passkey, 'secret', room);
    }

    function showChat() {
        document.getElementById('landing').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
        document.getElementById('roomTitle').innerText = currentRoom === 'public' ? 'Public Room' : currentRoom;
        document.getElementById('messages').innerHTML = '';
        document.getElementById('headerSub').innerText = 'Connected';
        stopVoice();  // fresh voice state for new room
    }

    function sendMsg() {
        const inp = document.getElementById('msgInput');
        const text = inp.value.trim();
        if (!text || !ws || ws.readyState !== 1) return;
        ws.send(JSON.stringify({ type: 'message', text }));
        inp.value = '';
    }

    function leaveRoom() {
        if (ws) ws.close();
        stopVoice();
        document.getElementById('chat').style.display = 'none';
        document.getElementById('landing').style.display = 'block';
        ws = null;
    }
</script>
</body>
</html>
